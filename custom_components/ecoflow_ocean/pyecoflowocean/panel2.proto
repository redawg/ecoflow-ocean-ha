message setMessage {
    setHeader header = 1;
 }
message setHeader {
    setValue pdata = 1;
    int32 src = 2;
    int32 dest = 3;
    int32 d_src = 4;
    int32 d_dest = 5;
    int32 enc_type = 6;
    int32 check_type = 7;
    int32 cmd_func = 8;
    int32 cmd_id = 9;
    int32 data_len = 10;
    int32 need_ack = 11;
    int32 is_ack = 12;
    int32 seq = 14;
    int32 product_id = 15;
    int32 version = 16;
    int32 payload_ver = 17;
    int32 time_snap = 18;
    int32 is_rw_cmd = 19;
    int32 is_queue = 20;
    int32 ack_type = 21;
    string code = 22;
    string from = 23;
    string module_sn = 24;
    string device_sn = 25;
}
message setValue {
    optional int32 value = 1;
	optional int32 value2 = 2;
}

    message sentProtoTime {
        setHeader1 header = 1;
    }
    message sentProtoTimeStat {
        setHeader2 header = 1;
    }

    message sentDisplayPropertyUpload {
        setHeader3 header = 1;
    }

    message sentProtoPushAndSet {
        setHeader4 header = 1;
    } 

    message sentStatisticsTotalReport {
        setHeader5 header = 1;
    } 

