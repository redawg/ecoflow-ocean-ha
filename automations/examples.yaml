# Example automations for EcoFlow Power Ocean
# Replace YOUR_SN with your inverter serial number after integration setup.

- alias: EcoFlow low battery SOC alert
  description: Notify when battery drops below 20%
  trigger:
    - platform: numeric_state
      entity_id: sensor.YOUR_SN_battery_soc
      below: 20
  action:
    - service: notify.notify
      data:
        title: Power Ocean
        message: "Battery SOC is {{ states('sensor.YOUR_SN_battery_soc') }}%"

- alias: EcoFlow grid export notification
  description: Notify when exporting to grid (>500 W export for 5 min)
  trigger:
    - platform: numeric_state
      entity_id: sensor.YOUR_SN_grid_power
      below: -500
      for:
        minutes: 5
  action:
    - service: notify.notify
      data:
        title: Power Ocean
        message: "Exporting {{ states('sensor.YOUR_SN_grid_power') | float(0) | abs }} W to grid"

- alias: EcoFlow system offline alert
  description: Alert when status sensor is unavailable for 10 minutes
  trigger:
    - platform: state
      entity_id: sensor.YOUR_SN_status
      to: unavailable
      for:
        minutes: 10
  action:
    - service: notify.notify
      data:
        title: Power Ocean
        message: "Power Ocean telemetry has been unavailable for 10 minutes"
