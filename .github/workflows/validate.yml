name: Validate

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-topics:
    name: Ensure Repository Topics
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Set HACS-required repository topics
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getAllTopics({ owner, repo });
            if (data.names?.length) {
              core.info(`Topics already set: ${data.names.join(', ')}`);
              return;
            }
            await github.rest.repos.replaceAllTopics({
              owner,
              repo,
              names: [
                'home-assistant',
                'hacs',
                'hacs-integration',
                'ecoflow',
                'power-ocean',
                'battery',
                'energy',
              ],
            });
            core.info('Repository topics set.');

  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    needs: set-topics
    if: always() && (needs.set-topics.result == 'success' || needs.set-topics.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest Validation
        uses: home-assistant/actions/hassfest@master
